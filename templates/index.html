<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Sistema Curricular</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
</head>
<body>
    <div class="layout-container">

        <aside class="sidebar">
            <h1>Grade de Engenharia de Software</h1>

            <section>
                <h2>Cadeia de Pré-requisitos</h2>
                <p>Matérias necessárias para chegar nesta disciplina.</p>
                <select id="req-disciplina">
                    <option value="">Selecione...</option>
                    {% for disciplina in disciplinas %}
                        <option value="{{ disciplina }}">{{ disciplina }}</option>
                    {% endfor %}
                </select>
                <button onclick="buscarPreRequisitos()">Buscar</button>
                <span id="req-resultado" class="resultado-box">Aguardando...</span>
            </section>

            <section>
                <h2>Disciplinas Dependentes</h2>
                <p>Matérias que ficarão travadas sem esta disciplina.</p>
                <select id="dep-disciplina">
                    <option value="">Selecione...</option>
                    {% for disciplina in disciplinas %}
                        <option value="{{ disciplina }}">{{ disciplina }}</option>
                    {% endfor %}
                </select>
                <button onclick="buscarDependentes()">Buscar</button>
                <span id="dep-resultado" class="resultado-box">Aguardando...</span>
            </section>

            <section>
                <h2>Distância em Semestres</h2>
                <select id="bfs-origem">
                    <option value="">Origem...</option>
                    {% for disciplina in disciplinas %}
                        <option value="{{ disciplina }}">{{ disciplina }}</option>
                    {% endfor %}
                </select>
                <select id="bfs-destino">
                    <option value="">Destino...</option>
                    {% for disciplina in disciplinas %}
                        <option value="{{ disciplina }}">{{ disciplina }}</option>
                    {% endfor %}
                </select>
                <button onclick="buscarDistancia()">Calcular</button>
                <span id="bfs-resultado" class="resultado-box">Aguardando...</span>
            </section>

            <button class="btn-limpar" onclick="limparBuscas()">Limpar Buscas</button>
        </aside>

        <main class="content">
            <div id="mynetwork"></div>
        </main>

    </div>

        <script src="{{ url_for('static', filename='script.js') }}"></script>
    </body>
</html>
